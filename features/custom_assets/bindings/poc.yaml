# Resource ID remapper — applied in every getter hook before lookup.
#
# cup_id   - optional. If omitted or null, the binding applies to every cup.
#            Otherwise only when g_cupId matches.
# replacements - list of {from, to} pairs. `from` is a vanilla resource id;
#                `to` may be vanilla or custom (>= 0x9000).
#
# Multiple bindings/*.yaml files are merged. One file per cup is recommended;
# wildcard bindings go into a dedicated file like this one.

replacements:
  - { from: 0x1729, to: 0x9000 }   # Yoshi cup name -> PoC custom entry
