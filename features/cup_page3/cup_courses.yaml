# Custom track definitions for the cup_page3 feature.
#
# `tracks` is an ordered list. Each entry becomes one playable course on the
# CUP3 (page 2) cursor grid. The order also drives:
#
# - cupId assignment:
#     * tracks[i]  -> cupId = 17 + i
#
#   cupId 0 (vanilla test_course dev leftover) and 9..16 (vanilla minigame /
#   challenge modes) are intentionally skipped. Every asset-getter path now
#   routes custom cupIds through the kCustomTracks table + cupId=0 alias
#   (see the hook family in cup_page3.cpp starting at CourseDataLoadCustom)
#   so cupId >= 17 is safe to extend indefinitely without touching vanilla
#   table layouts.
# - page2 cursor fill:
#     * kCupPage2Courses[i] = tracks[i].cupId, i < len(tracks)
#     * remainder filled with tracks[-1].cupId (the last track loops to fill
#       8 slots — currently test_course in every slot)
# - BGM ID assignment:
#     * each track consumes ONE bgm_id (= L/R pair). bgm_l / bgm_r are passed
#       straight to DVDOpen, no rodata dictionary lookup needed.
#     * existing dsp filenames (e.g. "bgm01_demoL.dsp") work as-is because the
#       file already lives in the ISO; gen just writes the string into patch
#       rodata and indexes it from the relocated BGM table.
#     * new dsp filenames must be placed under features/cup_page3/files/ so
#       Riivolution copies them to the disc root.
#
# Per-track fields:
#   collision_short:  filename for the short-lap collision .bin  (required)
#   collision_long:   filename for the long-lap collision .bin   (required)
#   line_bin:         filename for the AI path _line.bin          (required)
#   laps:             g_totalLaps                       (int, 1..127)
#   time:             g_raceTimeRemaining (seconds)     (float)
#   bonus:            g_lapBonusTimeDelta (seconds)     (float)
#   bgm_l / bgm_r:    DSP filenames passed to ClStream  (strings)
#
#   ai_lap_bonus_rules:
#     Optional list of AILapBonusRule entries (vanilla AI_CalcLapSpeedBonus
#     semantics). Walked top-to-bottom; first matching rule wins. Trailing
#     sentinel (ccClass=-100) is appended automatically by gen.
#     Per-rule fields (all optional, default in parentheses):
#       ccClass         (-1)  match g_ccClass exactly, or -1 = wildcard
#       subMode         (-1)  match g_roundIndex (lower byte) exactly
#       kartIdx         (-1)  match the AI kart index, or -1 = wildcard
#       position        (-1)  matched against (remainingLaps + 1).
#                             position=1 -> final lap (remaining=0).
#                             position=2 -> last-but-one lap, etc.
#       lapDiffMin       (0)  inclusive lower bound of (lapDifference vs leader)
#       lapDiffMax      (99)  inclusive upper bound
#       excludePosition (-1)  skip rule when (race position) matches; -1 = never
#       bonus           required; km/h added to AI base target speed.
#     Omit the whole list to leave AI_CalcLapSpeedBonus on its vanilla path
#     (cupId=0 / 9+ trigger off-by-one and need at least one override here).
#
#   base_speed:
#     Optional per-ccClass base AI target speed table (RACE mode). Each entry
#     is { lo: float, hi: float } in km/h. lo <= hi. Applied to all 8 round
#     indices unless overridden by base_speed_rounds.
#       "50cc"  -> ccClass 0
#       "100cc" -> ccClass 1
#       "150cc" -> ccClass 2
#     Omit to leave GetBaseSpeedMax/Min on their vanilla path (cupId=0 / 9+
#     fall back to entry[0] = 50cc Mario round0).
#
#   base_speed_rounds:
#     Optional per-ccClass per-round override on top of base_speed. Map of
#     ccClass -> { round_index: { lo, hi } }. round_index in 0..7
#     (0..3 = オモテ, 4..7 = ウラ).
#     Example:
#       base_speed_rounds:
#         "150cc":
#           4: { lo: 255.0, hi: 275.0 }   # ウラ round 0
#
# Voice announcer queue (DAT_80678d90, consumed by FUN_801b5e18) is left
# enabled for all tracks; the vanilla dequeue guard (`iVar10 == -1 skip`)
# is relaxed to `iVar10 < 0 skip` via a kmWrite32 patch in cup_page3.cpp,
# which lets sentinel/garbage shorts like -2 pass through harmlessly.
# The shared-SFX announcer lines (3-2-1 GO!, etc.) stay audible on every
# cup including test_course because they ride the same queue and are
# indexed by valid positive voice ids.

tracks:
  - name: test_course
    collision_short: grd_short.bin
    collision_long:  grd_long.bin
    line_bin:        test_course_short_line.bin
    laps:  3
    time:  120.0
    bonus: 15.0
    bgm_l: bgm01_demoL.dsp
    bgm_r: bgm01_demoR.dsp

    # Dumped from vanilla Mario fallback @ 0x803a34e0 (round=2, cup=1, variant=0),
    # with subMode normalized to -1 so the rules fire regardless of g_roundIndex.
    # Layer comments reflect the decompile of AI_CalcLapSpeedBonus at 0x801dd480.
    # Field order: {ccClass, subMode, kartIdx, position, lapDiffMin, lapDiffMax, excludePosition, bonus}
    # follows the vanilla struct (0x14 bytes) so diff-against-dump stays 1:1.
    #
    # Walker is first-match-break:
    #   - excludePosition=0 is effectively wildcard (compares racePos == -1).
    #     Vanilla Mario r0 entry[4] (pos=1,excl=0,+30) has this quirk and
    #     makes entry[5..7] dead. r2 here avoids that trap: the kartIdx-
    #     specific rules come first, then excl-guarded fallbacks.
    #   - position = remainingLaps + 1 (pos=1 = final lap, pos=9 = first lap
    #     of a 9-lap 150cc Mario race).
    #   - kartIdx is the fixed AI slot id (1..4), not race position. Slot 0
    #     has no rule in vanilla and falls through to wildcard fallbacks.
    ai_lap_bonus_rules:
      # --- Layer A: 150cc per-lap base (cc=2 confines these; 50/100cc skip) ---
      - { ccClass: 2, position: 1, bonus:  20.0 }   # 150cc final lap +20
      - { ccClass: 2, position: 2, bonus:  10.0 }
      - { ccClass: 2, position: 3, bonus:  10.0 }
      - { ccClass: 2, position: 4, bonus:  10.0 }
      - { ccClass: 2, position: 5, bonus:  10.0 }
      - { ccClass: 2, position: 9, lapDiffMin: 50, lapDiffMax: 128, bonus: -5.0 }  # 150cc opening-lap penalty

      # --- Layer B: final-lap (pos=1) kartIdx-specific boosts (cc wildcard) ---
      # These fire for 50cc / 100cc on the final lap. 150cc is intercepted
      # by Layer A above, so vanilla r2 has no per-kart differentiation on
      # 150cc final lap — that's intentional in vanilla's design.
      - { kartIdx: 1, position: 1, bonus:  50.0 }
      - { kartIdx: 2, position: 1, bonus:  40.0 }
      - { kartIdx: 3, position: 1, bonus:  35.0 }
      - { kartIdx: 4, position: 1, bonus:  20.0 }

      # Tactical final-lap refinements (pos=1, lapDiff window, kart=wildcard).
      # Reach only slot 0 and 5+ AIs since kart=1..4 were caught above.
      - { position: 1, lapDiffMin: 20, lapDiffMax: 35, excludePosition: 4, bonus:  0.0 }
      - { position: 1, lapDiffMin: 20, lapDiffMax: 35, excludePosition: 5, bonus:  0.0 }
      - { position: 1, lapDiffMin: 20, lapDiffMax: 35, bonus: 20.0 }
      - { position: 1, lapDiffMin: 60, lapDiffMax: 75, bonus: 20.0 }

      # --- Layer C: pos=2 (1 lap remaining) kart階段 ---
      - { kartIdx: 1, position: 2, bonus:  30.0 }
      - { kartIdx: 2, position: 2, bonus:  25.0 }
      - { kartIdx: 3, position: 2, bonus:  20.0 }
      - { kartIdx: 4, position: 2, bonus:  15.0 }
      - { position: 2, excludePosition: 5, bonus: -10.0 }   # 6位AIを除く全員 -10 (上記で kart=1..4 拾われ済)
      - { position: 2, lapDiffMin: 20, lapDiffMax: 35, bonus: 10.0 }
      - { position: 2, lapDiffMin: 60, lapDiffMax: 75, bonus: 10.0 }

      # --- Layer D: pos=3 mid-race penalties (順位別) ---
      - { position: 3, excludePosition: 4, bonus: -10.0 }   # 4位以外 -10
      - { position: 3, excludePosition: 5, bonus: -20.0 }   # 残った 4位AIにここで -20
      - { position: 3, lapDiffMin: 20, lapDiffMax: 35, bonus:  0.0 }
      - { position: 3, lapDiffMin: 60, lapDiffMax: 75, bonus:  0.0 }

      # --- Layer E: pos=4 deeper penalties ---
      - { position: 4, excludePosition: 3, bonus: -10.0 }
      - { position: 4, excludePosition: 4, bonus: -20.0 }
      - { position: 4, excludePosition: 5, bonus: -20.0 }
      - { position: 4, lapDiffMin: 20, lapDiffMax: 35, bonus: -10.0 }
      - { position: 4, lapDiffMin: 60, lapDiffMax: 75, bonus: -20.0 }

      # --- Layer F: deep backmarker penalties ---
      - { position: 5, bonus: -35.0 }
      - { ccClass: 0, position: 6, lapDiffMin:  0, lapDiffMax:  50, bonus: -35.0 }
      - { ccClass: 0, position: 6, lapDiffMin: 51, lapDiffMax: 128, bonus: -65.0 }
      - { ccClass: 1, position: 6, lapDiffMin:  0, lapDiffMax:  50, bonus: -55.0 }
      - { ccClass: 1, position: 6, lapDiffMin: 51, lapDiffMax: 128, bonus: -70.0 }

    base_speed:
      "50cc":  { lo: 145.0, hi: 160.0 }
      "100cc": { lo: 200.0, hi: 220.0 }
      "150cc": { lo: 250.0, hi: 270.0 }
