# Custom track definitions for the cup_page3 feature.
#
# `tracks` is an ordered list. Each entry becomes one playable course on the
# CUP3 (page 2) cursor grid. The order also drives:
#
# - cupId assignment:
#     * tracks[0]              -> cupId 0   (test_course slot, special-cased
#                                            by PathData_GetByContext /
#                                            RaceParamsHook etc.)
#     * tracks[1..8]           -> cupId 9..16 (vanilla "generic" cup slots
#                                              that share DAT_806d8ac0 BGM)
#     * tracks[9..]            -> cupId 17.. (new slots; gen extends the
#                                             WeatherSystem_Init dispatch)
# - page2 cursor fill:
#     * kCupPage2Courses[i] = tracks[i].cupId, i < len(tracks)
#     * remainder filled with tracks[-1].cupId (the last track loops to fill
#       8 slots — currently test_course in every slot)
# - BGM ID assignment:
#     * each track consumes ONE bgm_id (= L/R pair). bgm_l / bgm_r are passed
#       straight to DVDOpen, no rodata dictionary lookup needed.
#     * existing dsp filenames (e.g. "bgm01_demoL.dsp") work as-is because the
#       file already lives in the ISO; gen just writes the string into patch
#       rodata and indexes it from the relocated BGM table.
#     * new dsp filenames must be placed under features/cup_page3/files/ so
#       Riivolution copies them to the disc root.
#
# Per-track fields:
#   collision_short:  filename for the short-lap collision .bin  (required)
#   collision_long:   filename for the long-lap collision .bin   (required)
#   line_bin:         filename for the AI path _line.bin          (required)
#   laps:             g_totalLaps                       (int, 1..127)
#   time:             g_raceTimeRemaining (seconds)     (float)
#   bonus:            g_lapBonusTimeDelta (seconds)     (float)
#   bgm_l / bgm_r:    DSP filenames passed to ClStream  (strings)
#
#   ai_lap_bonus_rules:
#     Optional list of AILapBonusRule entries (vanilla AI_CalcLapSpeedBonus
#     semantics). Walked top-to-bottom; first matching rule wins. Trailing
#     sentinel (ccClass=-100) is appended automatically by gen.
#     Per-rule fields (all optional, default in parentheses):
#       ccClass         (-1)  match g_ccClass exactly, or -1 = wildcard
#       subMode         (-1)  match g_roundIndex (lower byte) exactly
#       kartIdx         (-1)  match the AI kart index, or -1 = wildcard
#       position        (-1)  matched against (remainingLaps + 1).
#                             position=1 -> final lap (remaining=0).
#                             position=2 -> last-but-one lap, etc.
#       lapDiffMin       (0)  inclusive lower bound of (lapDifference vs leader)
#       lapDiffMax      (99)  inclusive upper bound
#       excludePosition (-1)  skip rule when (race position) matches; -1 = never
#       bonus           required; km/h added to AI base target speed.
#     Omit the whole list to leave AI_CalcLapSpeedBonus on its vanilla path
#     (cupId=0 / 9+ trigger off-by-one and need at least one override here).
#
#   base_speed:
#     Optional per-ccClass base AI target speed table (RACE mode). Each entry
#     is { lo: float, hi: float } in km/h. lo <= hi. Applied to all 8 round
#     indices unless overridden by base_speed_rounds.
#       "50cc"  -> ccClass 0
#       "100cc" -> ccClass 1
#       "150cc" -> ccClass 2
#     Omit to leave GetBaseSpeedMax/Min on their vanilla path (cupId=0 / 9+
#     fall back to entry[0] = 50cc Mario round0).
#
#   base_speed_rounds:
#     Optional per-ccClass per-round override on top of base_speed. Map of
#     ccClass -> { round_index: { lo, hi } }. round_index in 0..7
#     (0..3 = オモテ, 4..7 = ウラ).
#     Example:
#       base_speed_rounds:
#         "150cc":
#           4: { lo: 255.0, hi: 275.0 }   # ウラ round 0
#
# Voice announcer queue (DAT_80678d90, consumed by FUN_801b5e18) is left
# enabled for all tracks; the vanilla dequeue guard (`iVar10 == -1 skip`)
# is relaxed to `iVar10 < 0 skip` via a kmWrite32 patch in cup_page3.cpp,
# which lets sentinel/garbage shorts like -2 pass through harmlessly.
# The shared-SFX announcer lines (3-2-1 GO!, etc.) stay audible on every
# cup including test_course because they ride the same queue and are
# indexed by valid positive voice ids.

tracks:
  - name: test_course
    collision_short: grd_short.bin
    collision_long:  grd_long.bin
    line_bin:        test_course_short_line.bin
    laps:  3
    time:  120.0
    bonus: 15.0
    bgm_l: bgm01_demoL.dsp
    bgm_r: bgm01_demoR.dsp

    ai_lap_bonus_rules:
      - { position: 1, bonus: 60.0 }   # final lap: 1位以外に+60 km/h
      - { bonus: 20.0 }                 # default catch-up

    base_speed:
      "50cc":  { lo: 145.0, hi: 160.0 }
      "100cc": { lo: 200.0, hi: 220.0 }
      "150cc": { lo: 250.0, hi: 270.0 }
